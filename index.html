    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>

    <script>
        function returnClassNumber(ranking, adjustment = 0) {
            ranking = ranking % 6;
            if (ranking == 1 || ranking == 0) {
                return 1+adjustment;
            } else if (ranking == 2 || ranking == 5) {
                return 2+adjustment;
            } else {
                return 3+adjustment;
            }
        }

        function bClassRanking(ranking) {
            if (ranking == 1 || ranking == 0) {
                return 1;
            } else if (ranking == 2 || ranking == 7) {
                return 2;
            } else if (ranking == 3 || ranking == 6) {
                return 3;
            }
            return 4;
        }

        function calculateClass(ranking) {
            const maxCapacityA13 = 38;
            const maxCapacityA46 = 36;

            if (ranking <= maxCapacityA13 * 3) {
                // Classes A1 to A3
                $('#predClass1').text('5SA' + returnClassNumber(ranking));
            } else if (ranking <= (maxCapacityA13*3+maxCapacityA46*3)) {
                // Classes A4 to A6
                const adjustedRanking = ranking - (maxCapacityA13 * 3);
                $('#predClass1').text('5SA' + returnClassNumber(adjustedRanking, 3));
            } else {
                const adjustedRanking = (ranking - (maxCapacityA13*3+maxCapacityA46*3)) % 8;
                $('#predClass1').text('5SB' + bClassRanking(adjustedRanking));
            }
        }

        $(document).ready(() => {
            $("#sk-stream").on("input", function() {
                let value = $(this).val();
                let ranking = value % 4;
                
                if (value != 0 && (ranking == 0 || ranking == 1)) {
                    $('#predClass2').text('5KB1 / 5SK1 / 5SE1');
                } else {
                    $('#predClass2').text('5KB2 / 5SK2 / 5SE2');
                }
            })

            $("#sc-stream").on("input", function() {
                let value = $(this).val();
                if (value != 0) {
                    calculateClass(value);
                }   
            })
        })
    </script>
