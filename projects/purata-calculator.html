<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Purata Calculator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css"/>
    <link rel="shortcut icon" href="./assets/purataCalculator.ico" type="image/x-icon">

    <meta name="title" content="Purata Calculator for CLHS students">
    <meta name="description" content="Lazy of inputting everything into your calculator? Well you could do that here without a single click! Just input your results and leave the rest to us">

    <!-- Open Graph / Facebook / Discord-->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Purata Calculator for CLHS students">
    <meta property="og:description" content="Lazy of inputting everything into your calculator? Well you could do that here without a single click! Just input your results and leave the rest to us">
    <meta property="og:image" content="./assets/purataCalculator.png">
    <meta name="theme-color" content="#E0E0E0">

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:title" content="Purata Calculator for CLHS students">
    <meta property="twitter:description" content="Lazy of inputting everything into your calculator? Well you could do that here without a single click! Just input your results and leave the rest to us">
    <meta property="twitter:image" content="./assets/purataCalculator.png">
</head>
<body class="h-100 text-center text-white bg-dark">
        <nav class="navbar navbar-expand-lg navbar-light bg-light">
          <div class="container-fluid">
            <a href="http://localhost:4000/" class="text-decoration-none">
                <div class="text-black fw-bolder d-flex">
                    <img src="./assets/purataCalculator.ico" alt="Icon" width="30px" class="d-inline-block align-text-top" />
                    Purata Calculator
                </div>
            </a>
          </div>
        </nav>            
        
    <div class="container p-5">
        <div class="align-content-md-center mb-3 text-capitalize fw-bolder text-wrap fs-3">
            <span class="badge btn-success btn" id="purata-badge">Your Purata: <span id="purata"></span></span>
            <span class="badge btn-success btn" id="target-badge" data-bs-toggle="tooltip" data-bs-placement="bottom" data-bs-title="This represents the marks you must obtain in order to achieve your target purata. Red means impossible, Yellow means hard, Green means doable">Marks of The Rest: <span id="targetpurata"></span></span>              
        </div>
        <div class="row">
            <div class="col">
                <input type="number" name="target" id="target" min="0" max="100" class="form-control" placeholder="Input your target purata">
            </div>
            <div class="col">
                <select id="stream" class="form-select">
                    <option disabled selected value> -- select your stream -- </option>
                </select>
            </div>
        </div>
        <table class="table table-dark table-striped table-hover table-bordered mt-3">
            <thead>
                <tr>
                    <th>Subject</th>
                    <th>Pemberat</th>
                    <th>Marks</th>
                </tr>
            </thead>
            <tbody id="tbody">
                
            </tbody>
        </table>

        <button id="addRow" class="btn btn-info mb-4">Add Row</button>
        <button id="calculate" class="btn btn-success mb-4">Calculate!</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/purata-calculator.js"></script>
</body>
</html>
